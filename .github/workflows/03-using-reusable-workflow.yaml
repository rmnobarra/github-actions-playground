name: Print a text

on:
  workflow_dispatch:

jobs:
  call-reusable-workflow:
    runs-on: ubuntu-latest
    name: Print a text
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Call Reusable Workflow
        uses: rmnobarra/github-actions-playground/.github/workflows/02-reusable-workflow.yaml@main
        with:
          input_text: "Hello, World!"
